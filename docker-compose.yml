services:
  autovault:
    build: .
    image: autoworks/autovault:dev
    ports:
      - "3000:3000"
    environment:
      AUTOVAULT_MODE: remote
      AUTOVAULT_STORAGE_PATH: /data/autovault
      AUTOVAULT_PUBLIC_URL: ${AUTOVAULT_PUBLIC_URL:-http://localhost:3000}
      AUTOVAULT_HTTP_PORT: 3000
      AUTOVAULT_ADMIN_EMAIL: ${AUTOVAULT_ADMIN_EMAIL:?Set AUTOVAULT_ADMIN_EMAIL}
      AUTOVAULT_ADMIN_PASSWORD: ${AUTOVAULT_ADMIN_PASSWORD:?Set AUTOVAULT_ADMIN_PASSWORD to a long random password}
      AUTOVAULT_SECURITY_STRICT: "true"
      AUTOVAULT_SEARCH_MODE: text
      AUTOVAULT_LOG_LEVEL: info
      AUTOVAULT_ALLOWED_ORIGINS: ${AUTOVAULT_ALLOWED_ORIGINS:-}
    volumes:
      - autovault-data:/data/autovault
    restart: unless-stopped

volumes:
  autovault-data:
