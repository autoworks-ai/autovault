# Release Please - Automated versioning and dual-registry publishing
#
# How it works:
# 1. Every push to main with conventional commits updates a "Release PR"
# 2. When you merge the Release PR, it:
#    - Updates version in package.json
#    - Updates CHANGELOG.md
#    - Updates server.json (extra-files)
#    - Creates a GitHub Release with tag (which docker-publish.yml listens to)
#    - Triggers npm publish + GitHub Packages publish after the release is approved
#
# Commit message format:
#   feat: add new feature          → minor version bump
#   fix: fix a bug                 → patch version bump
#   feat!: breaking change         → major version bump
#   chore/docs: no version bump
#
# npm Publishing (future package install path):
#   Uses Trusted Publishing (OIDC) - no NPM_TOKEN needed.
#   Requires Node 24+ for npm 11.5.1+ OIDC support.
#   Configure at: https://www.npmjs.com/package/@autoworks-ai/autovault/access
#   Do not advertise npm install commands until this package is actually public.
#
# GitHub Packages (org mirror):
#   Same package/version published to npm.pkg.github.com using GITHUB_TOKEN.
#   The mirror rebuilds from source in a separate job, so the tarball is not
#   guaranteed to be byte-identical to the npmjs.com one.
#   Mirror only. The shell installer and GHCR image remain the documented
#   public install paths until npm publishing is fully live.
#   Failures here do NOT fail the release (continue-on-error).
#
# RELEASE_PLEASE_TOKEN:
#   Uses org-level PAT so the Release PR triggers CI workflows.
#   PRs created by GITHUB_TOKEN don't trigger other workflows (GitHub security).

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          manifest-file: ".release-please-manifest.json"
          config-file: "release-please-config.json"
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Trusted Publishing: No NPM_TOKEN needed!
      - run: npm publish --provenance --access public

  gh-packages-publish:
    needs: [release-please, npm-publish]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@autoworks-ai"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      # GitHub Packages auth uses GITHUB_TOKEN; no provenance support there.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
