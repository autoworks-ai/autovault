version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      production-minor-patch:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      typescript-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        patterns:
          - "@types/*"
          - "tsx"
          - "typescript"
        update-types:
          - "minor"
          - "patch"
      test-tooling-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        patterns:
          - "@vitest/*"
          - "vitest"
        update-types:
          - "minor"
          - "patch"
      development-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        exclude-patterns:
          - "@types/*"
          - "@vitest/*"
          - "tsx"
          - "typescript"
          - "vitest"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
